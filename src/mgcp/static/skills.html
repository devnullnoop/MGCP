<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compiled Skills - MGCP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-cyan': '#4fc3f7',
                        'brand-dark': '#0a0a1a',
                        'brand-panel': '#1a1a2e',
                        'brand-surface': '#0f0f23',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-gray-200 font-sans min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-br from-brand-panel to-brand-surface px-6 py-4 flex justify-between items-center border-b border-brand-cyan">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-semibold text-white">Compiled Skills</h1>
            <nav class="flex gap-4 text-sm">
                <a href="/" class="text-gray-400 hover:text-brand-cyan transition-colors">Dashboard</a>
                <a href="/session" class="text-gray-400 hover:text-brand-cyan transition-colors">Sessions</a>
                <a href="/lessons" class="text-gray-400 hover:text-brand-cyan transition-colors">Lessons</a>
                <a href="/skills" class="text-brand-cyan">Skills</a>
                <a href="/projects" class="text-gray-400 hover:text-brand-cyan transition-colors">Projects</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8 max-w-6xl">
        <!-- Stats Bar -->
        <div class="flex gap-6 mb-6 text-sm">
            <div class="text-gray-400">
                Total Skills: <span id="total-skills" class="text-white font-medium">0</span>
            </div>
            <div class="text-gray-400">
                Graduated Lessons: <span id="total-graduated" class="text-amber-400 font-medium">0</span>
            </div>
            <div class="text-gray-400">
                Drift Alerts: <span id="drift-alerts" class="text-red-400 font-medium">0</span>
            </div>
        </div>

        <!-- Info Banner -->
        <div class="bg-brand-panel/50 border border-gray-700 rounded-lg p-4 mb-6 text-sm text-gray-400">
            Skills are compiled from mature lesson communities via <code class="text-brand-cyan">mgcp-compile-skills</code> CLI or the <code class="text-brand-cyan">compile_skill</code> MCP tool. This page is read-only.
        </div>

        <!-- Skills List -->
        <div id="skills-list" class="space-y-3">
            <div class="text-gray-500 text-center py-12">Loading skills...</div>
        </div>
    </main>

    <script>
        const API_BASE = window.location.origin;
        let skills = [];

        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    headers: { 'Content-Type': 'application/json' }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (err) {
                console.error(`API error (${endpoint}):`, err);
                return null;
            }
        }

        async function loadSkills() {
            const data = await fetchAPI('/api/compiled-skills');
            if (data) {
                skills = data;
                renderSkills();
            }
        }

        function renderSkills() {
            const container = document.getElementById('skills-list');

            // Update stats
            document.getElementById('total-skills').textContent = skills.length;
            document.getElementById('total-graduated').textContent =
                skills.reduce((sum, s) => sum + s.member_count, 0);
            document.getElementById('drift-alerts').textContent =
                skills.filter(s => s.drift_count > 0).length;

            if (!skills || skills.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <div class="text-lg mb-2">No compiled skills yet</div>
                        <div class="text-sm">Use <code class="text-brand-cyan">mgcp-compile-skills compile --all</code> to compile ready communities.</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = skills.map((skill, index) => {
                const driftBadge = skill.drift_count > 0
                    ? `<span class="text-xs bg-red-500/20 text-red-400 px-2 py-0.5 rounded">DRIFT (${skill.drift_count})</span>`
                    : `<span class="text-xs bg-green-500/20 text-green-400 px-2 py-0.5 rounded">OK</span>`;

                const compiledDate = new Date(skill.compiled_at).toLocaleDateString();

                return `
                    <div class="bg-brand-panel rounded-lg border border-gray-700">
                        <div class="p-4 hover:bg-white/5 cursor-pointer transition-all" onclick="toggleSkill(${index})">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-brand-cyan font-medium">${escapeHtml(skill.skill_name)}</span>
                                        <span class="text-xs bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded">v${skill.version}</span>
                                        ${driftBadge}
                                    </div>
                                    <div class="flex items-center gap-4 text-xs text-gray-500 mt-1">
                                        <span>Community: ${escapeHtml(skill.community_id.substring(0, 8))}...</span>
                                        <span>${skill.member_count} lessons</span>
                                        <span>Compiled: ${compiledDate}</span>
                                    </div>
                                </div>
                                <div class="text-right text-xs text-gray-500">
                                    <div class="font-mono text-gray-600 truncate max-w-xs" title="${escapeHtml(skill.skill_path)}">${escapeHtml(skill.skill_path.split('/').slice(-2).join('/'))}</div>
                                </div>
                            </div>
                        </div>
                        <!-- Expanded Details -->
                        <div id="skill-detail-${index}" class="hidden border-t border-gray-700 p-4">
                            <div class="text-xs text-gray-500 uppercase tracking-wide mb-3">Member Lessons</div>
                            <div id="skill-members-${index}" class="space-y-2">
                                <div class="text-sm text-gray-500">Loading...</div>
                            </div>
                            ${skill.drift_count > 0 ? `
                                <div class="mt-4 p-3 bg-red-500/10 border border-red-500/30 rounded">
                                    <div class="text-xs text-red-400 uppercase tracking-wide mb-2">Drift Detected</div>
                                    <div class="text-sm text-gray-300">
                                        ${skill.drift_count} lesson(s) refined since compilation:
                                        <span class="text-red-400 font-mono">${skill.drift_lessons.join(', ')}</span>
                                    </div>
                                    <div class="text-xs text-gray-500 mt-1">Run <code class="text-brand-cyan">mgcp-compile-skills compile -c ${escapeHtml(skill.community_id)}</code> to recompile.</div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleSkill(index) {
            const detail = document.getElementById(`skill-detail-${index}`);
            const isHidden = detail.classList.contains('hidden');

            // Close all other details
            document.querySelectorAll('[id^="skill-detail-"]').forEach(el => el.classList.add('hidden'));

            if (isHidden) {
                detail.classList.remove('hidden');
                // Load member details
                const skill = skills[index];
                const data = await fetchAPI(`/api/compiled-skills/${skill.skill_name}`);
                if (data && data.members) {
                    const membersContainer = document.getElementById(`skill-members-${index}`);
                    membersContainer.innerHTML = data.members.map(member => {
                        const isDrift = data.drift_lessons.includes(member.id);
                        return `
                            <div class="flex items-center justify-between bg-brand-dark/50 rounded px-3 py-2 ${isDrift ? 'border-l-2 border-red-500' : ''}">
                                <div class="flex items-center gap-2">
                                    <span class="text-sm text-brand-cyan/80 font-mono">${escapeHtml(member.id)}</span>
                                    <span class="text-xs text-gray-500">v${member.version}</span>
                                    ${member.graduated_to ? `<span class="text-xs bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded">&rarr; ${escapeHtml(member.graduated_to)}</span>` : ''}
                                    ${isDrift ? '<span class="text-xs text-red-400">changed</span>' : ''}
                                </div>
                                <div class="text-xs text-gray-500 max-w-md truncate">${escapeHtml(member.action)}</div>
                            </div>
                        `;
                    }).join('');
                }
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        loadSkills();
    </script>
</body>
</html>
